services:
  postgres:
    image: postgres:15-alpine
    container_name: cart_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: cart_db
    ports:
      - "5434:5432"
    volumes:
      - cart_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docker -d cart_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cart_postgres_data:
